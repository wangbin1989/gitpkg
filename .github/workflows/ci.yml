name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-26.04
            rid: linux-x64
          - os: ubuntu-26.04-arm
            rid: linux-arm64
          # macOS
          - os: macos-26
            rid: osx-arm64
          # Windows
          - os: windows-2025
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - run: dotnet build

      - run: dotnet test
