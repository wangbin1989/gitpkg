name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
      - run: dotnet test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            rid: linux-x64
            name: linux-x86_64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            name: linux-arm64
          # macOS
          - os: macos-latest
            rid: osx-arm64
            name: darwin-arm64
          # Windows
          - os: windows-latest
            rid: win-x64
            name: windows-x86_64
          - os: windows-11-arm
            rid: win-arm64
            name: windows-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Get version
        id: version
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' src/GitPkg/GitPkg.csproj)
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Publish
        run: dotnet publish src/GitPkg -c Release -r ${{ matrix.rid }} -o publish

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd publish
          tar -czf ../gitpkg-${{ steps.version.outputs.version }}-${{ matrix.name }}.tar.gz gitpkg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd publish
          Compress-Archive -Path gitpkg.exe -DestinationPath ../gitpkg-${{ steps.version.outputs.version }}-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: gitpkg-${{ steps.version.outputs.version }}-${{ matrix.name }}
          path: |
            gitpkg-${{ steps.version.outputs.version }}-${{ matrix.name }}.*
            !publish/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir dist
          find artifacts -type f -not -path '*/publish/*' -exec cp {} dist/ \;
          ls -lh dist/

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz *.zip > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
